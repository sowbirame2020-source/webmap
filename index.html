<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <link rel="stylesheet" href="css/leaflet-measure.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title>Carte Web Sénégal</title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="js/leaflet-measure.js"></script>
        <script src="data/regions09_1.js"></script>
        <script src="data/Secteursdactivits_2.js"></script>
        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:10, minZoom:4
        }).fitBounds([[12.185278332783342,-18.4375199575576],[16.802475892659807,-10.394861964979004]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var title = new L.Control({'position':'topleft'});
        title.onAdd = function (map) {
            this._div = L.DomUtil.create('div', 'info');
            this.update();
            return this._div;
        };
        title.update = function () {
            this._div.innerHTML = '<h2>Carte Web Sénégal</h2>';
        };
        title.addTo(map);
        var abstract = new L.Control({'position':'topleft'});
        abstract.onAdd = function (map) {
            this._div = L.DomUtil.create('div',
            'leaflet-control abstract');
            this._div.id = 'abstract'

                abstract.show();
                return this._div;
            };
            abstract.show = function () {
                this._div.classList.remove("abstract");
                this._div.classList.add("abstractUncollapsed");
                this._div.innerHTML = 'UNe cartographie fictive des secteurs d\'activités au Sénégal et de la densité de la population par région';
        };
        abstract.addTo(map);
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var measureControl = new L.Control.Measure({
            position: 'topleft',
            primaryLengthUnit: 'meters',
            secondaryLengthUnit: 'kilometers',
            primaryAreaUnit: 'sqmeters',
            secondaryAreaUnit: 'hectares'
        });
        measureControl.addTo(map);
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].innerHTML = '';
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].className += ' fas fa-ruler';
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_GoogleMaps_0');
        map.getPane('pane_GoogleMaps_0').style.zIndex = 400;
        var layer_GoogleMaps_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleMaps_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 4,
            maxZoom: 10,
        });
        layer_GoogleMaps_0;
        map.addLayer(layer_GoogleMaps_0);
        function pop_regions09_1(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">NOMREG</th>\
                        <td class="visible-with-data" id="NOMREG">' + (feature.properties['NOMREG'] !== null ? autolinker.link(String(feature.properties['NOMREG']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">POP2010</th>\
                        <td class="visible-with-data" id="POP2010">' + (feature.properties['POP2010'] !== null ? autolinker.link(String(feature.properties['POP2010']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_regions09_1_0(feature) {
            if (feature.properties['POP2010'] >= 129908.000000 && feature.properties['POP2010'] <= 622364.600000 ) {
                return {
                pane: 'pane_regions09_1',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(255,255,255,1.0)',
                interactive: true,
            }
            }
            if (feature.properties['POP2010'] >= 622364.600000 && feature.properties['POP2010'] <= 1114821.200000 ) {
                return {
                pane: 'pane_regions09_1',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(255,191,191,1.0)',
                interactive: true,
            }
            }
            if (feature.properties['POP2010'] >= 1114821.200000 && feature.properties['POP2010'] <= 1607277.800000 ) {
                return {
                pane: 'pane_regions09_1',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(255,128,128,1.0)',
                interactive: true,
            }
            }
            if (feature.properties['POP2010'] >= 1607277.800000 && feature.properties['POP2010'] <= 2099734.400000 ) {
                return {
                pane: 'pane_regions09_1',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(255,64,64,1.0)',
                interactive: true,
            }
            }
            if (feature.properties['POP2010'] >= 2099734.400000 && feature.properties['POP2010'] <= 2592191.000000 ) {
                return {
                pane: 'pane_regions09_1',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(255,0,0,1.0)',
                interactive: true,
            }
            }
        }
        map.createPane('pane_regions09_1');
        map.getPane('pane_regions09_1').style.zIndex = 401;
        map.getPane('pane_regions09_1').style['mix-blend-mode'] = 'normal';
        var layer_regions09_1 = new L.geoJson(json_regions09_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_regions09_1',
            layerName: 'layer_regions09_1',
            pane: 'pane_regions09_1',
            onEachFeature: pop_regions09_1,
            style: style_regions09_1_0,
        });
        bounds_group.addLayer(layer_regions09_1);
        map.addLayer(layer_regions09_1);
        function pop_Secteursdactivits_2(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Nom</th>\
                        <td class="visible-with-data" id="NOMREG">' + (feature.properties['NOMREG'] !== null ? autolinker.link(String(feature.properties['NOMREG']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Population</th>\
                        <td class="visible-with-data" id="POP2010">' + (feature.properties['POP2010'] !== null ? autolinker.link(String(feature.properties['POP2010']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Secteur D\'activités</th>\
                        <td class="visible-with-data" id="Secteur">' + (feature.properties['Secteur'] !== null ? autolinker.link(String(feature.properties['Secteur']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_Secteursdactivits_2_0(feature) {
            switch(String(feature.properties['Secteur'])) {
                case 'Agricole':
                    return {
                pane: 'pane_Secteursdactivits_2',
                radius: 8.000000000000004,
                opacity: 1,
                color: 'rgba(35,35,35,0.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(255,178,13,1.0)',
                interactive: true,
            }
                    break;
                case 'Minier':
                    return {
                pane: 'pane_Secteursdactivits_2',
                radius: 8.000000000000004,
                opacity: 1,
                color: 'rgba(35,35,35,0.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(255,15,60,1.0)',
                interactive: true,
            }
                    break;
                case 'Télécom':
                    return {
                pane: 'pane_Secteursdactivits_2',
                radius: 8.000000000000004,
                opacity: 1,
                color: 'rgba(35,35,35,0.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(11,242,238,1.0)',
                interactive: true,
            }
                    break;
            }
        }
        map.createPane('pane_Secteursdactivits_2');
        map.getPane('pane_Secteursdactivits_2').style.zIndex = 402;
        map.getPane('pane_Secteursdactivits_2').style['mix-blend-mode'] = 'normal';
        var layer_Secteursdactivits_2 = new L.geoJson(json_Secteursdactivits_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_Secteursdactivits_2',
            layerName: 'layer_Secteursdactivits_2',
            pane: 'pane_Secteursdactivits_2',
            onEachFeature: pop_Secteursdactivits_2,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_Secteursdactivits_2_0(feature));
            },
        });
        bounds_group.addLayer(layer_Secteursdactivits_2);
        map.addLayer(layer_Secteursdactivits_2);
        var overlaysTree = [
            {label: 'Secteurs d\'activités <br /><table><tr><td style="text-align: center;"><img src="legend/Secteursdactivits_2_Agricole0.png" /></td><td>Agricole</td></tr><tr><td style="text-align: center;"><img src="legend/Secteursdactivits_2_Minier1.png" /></td><td>Minier</td></tr><tr><td style="text-align: center;"><img src="legend/Secteursdactivits_2_Télécom2.png" /></td><td>Télécom</td></tr></table>', layer: layer_Secteursdactivits_2},
            {label: 'regions09<br /><table><tr><td style="text-align: center;"><img src="legend/regions09_1_1299086223650.png" /></td><td>129908 - 622365</td></tr><tr><td style="text-align: center;"><img src="legend/regions09_1_62236511148211.png" /></td><td>622365 - 1114821</td></tr><tr><td style="text-align: center;"><img src="legend/regions09_1_111482116072782.png" /></td><td>1114821 - 1607278</td></tr><tr><td style="text-align: center;"><img src="legend/regions09_1_160727820997343.png" /></td><td>1607278 - 2099734</td></tr><tr><td style="text-align: center;"><img src="legend/regions09_1_209973425921914.png" /></td><td>2099734 - 2592191</td></tr></table>', layer: layer_regions09_1},
            {label: "Google Maps", layer: layer_GoogleMaps_0},]
        var lay = L.control.layers.tree(null, overlaysTree,{
            //namedToggle: true,
            //selectorBack: false,
            //closedSymbol: '&#8862; &#x1f5c0;',
            //openedSymbol: '&#8863; &#x1f5c1;',
            //collapseAll: 'Collapse all',
            //expandAll: 'Expand all',
            collapsed: true,
        });
        lay.addTo(map);
        setBounds();
        </script>        
    </body>
</html>
